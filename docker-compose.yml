  runner9:
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: runner9
    working_dir: /root/runner9
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        RUNNER_NAME: runner9
        RUNNER_TOKEN: ACAM5B57FIRZEMPKIUY4ZWDKJXFPC
        LABELS: ubuntu,linux,arm64,docker

  summer:
    container_name: summer
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.user
      args:
        USERNAME: summer
    environment:
      PORT: 18080
    volumes:
      - ./users/summer:/home/summer
      - /var/run/docker.sock:/var/run/docker.sock
      - ./summer-entrypoint.sh:/summer-entrypoint.sh
    working_dir: /home/summer/asset
    command: claude rc --name "Landing Wording UI" --permission-mode bypassPermissions

  certbot:
    container_name: certbot
    image: certbot/certbot
    volumes:
      - ./certbot/etc:/etc/letsencrypt
      - ./certbot/var:/var/lib/letsencrypt
      - ./certbot/webroot:/var/www/certbot

  n8n:
    container_name: n8n
    restart: always
    image: docker.n8n.io/n8nio/n8n
    volumes:
      - ./.n8n:/home/node/.n8n
    environment:
      N8N_SECURE_COOKIE: false
      TZ: Asia/Seoul
      DB_TYPE: "sqlite"
      DB_SQLITE_DATABASE: "/home/node/.n8n/database.sqlite"
      N8N_PORT: "9000"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      GENERIC_TIMEZONE: "Asia/Seoul"
      N8N_DOMAIN: "n8n.hackartist.io"
      WEBHOOK_URL: https://n8n.hackartist.io/
      N8N_PROXY_HOPS: 1
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
