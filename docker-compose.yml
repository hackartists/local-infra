services:
  nginx:
    container_name: nginx
    restart: always
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/etc:/etc/letsencrypt:ro
      - ./certbot/var:/var/lib/letsencrypt
      - ./certbot/webroot:/var/www/certbot:ro
      - ./nginx/webroot:/var/www/pr:ro
    depends_on:
      - n8n

  runner1:
    container_name: runner1
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
    working_dir: /root/actions-runner
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        RUNNER_TOKEN: ACAM5B74RV4VUHLY3V6XTUDKF6S5Q
        LABELS: linux,arm64,asset

  runner2:
    container_name: runner2
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
    working_dir: /root/runner2
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        RUNNER_NAME: runner2
        RUNNER_TOKEN: ACAM5B3ZOFH3QXCD3DHBIFDKF6THO
        LABELS: linux,arm64

  runner3:
    container_name: runner3
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
    working_dir: /root/runner3
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        RUNNER_NAME: runner3
        RUNNER_TOKEN: ACAM5B2RJ5HYEZTKJR7QS5DKF6VJK
        LABELS: linux,arm64

  runner4:
    container_name: runner4
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
    working_dir: /root/runner4
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        RUNNER_NAME: runner4
        RUNNER_TOKEN: ACAM5B3AAJVQH32IF6HM7FDKF7LE2
        LABELS: linux,arm64

  runner5:
    container_name: runner5
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
    working_dir: /root/runner5
    build:
