        RUNNER_NAME: runner6
        RUNNER_TOKEN: ACAM5BZEIN6JWOH7MS5UPIDKF7LLE
        LABELS: linux,arm64

  runner7:
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: runner7
    working_dir: /root/runner7
