# Shared with other compose projects (e.g. users/*/asset).
# Create once with: docker network create biyard-dev
networks:
  default:
    name: biyard-dev
    external: true

services:
  nginx:
    container_name: nginx
    restart: always
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/etc:/etc/letsencrypt:ro
      - ./certbot/var:/var/lib/letsencrypt
      - ./certbot/webroot:/var/www/certbot:ro
      - ./nginx/webroot:/var/www/pr:ro
    depends_on:
      - n8n

  runner1:
    container_name: runner1
    restart: always
    image: public.ecr.aws/sam/build-provided.al2023:latest
    volumes:
      - ./nginx/webroot:/root/nginx
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runners/runner1:/root/runner
      - ./runner-entrypoint.sh:/root/runner-entrypoint.sh
    environment:
      RUNNER_NAME: runner1
      RUNNER_TOKEN: ACAM5BZNVBHWU5EVBQ7A6XDKK6HQ4
      LABELS: linux,arm64,docker
    build:
      context: .
      dockerfile: Dockerfile.runner

