events {
    worker_connections 1024;
}

http {
    # HTTP - redirect to HTTPS & serve ACME challenge
    server {
        listen 80;
        server_name n8n.hackartist.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name n8n.hackartist.io;

        ssl_certificate /etc/letsencrypt/live/n8n.hackartist.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/n8n.hackartist.io/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://n8n:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (needed by n8n)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
