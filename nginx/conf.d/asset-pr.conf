# {svc}-{pr}.pr.biyard.co  — per-PR static preview hosting
#
#   asset-1.pr.biyard.co
#     /      -> static files in  /var/www/pr/asset-1   (host: nginx/webroot/asset-1)
#     /api/  -> https://asset.biyard.co/api/
#
#   essence-1.pr.biyard.co
#     /      -> static files in  /var/www/pr/essence-1 (host: nginx/webroot/essence-1)
#     /api/  -> https://essence.biyard.co/api/
#
# Requires a wildcard cert for *.pr.biyard.co (DNS-01 challenge):
#   certbot certonly --manual --preferred-challenges dns -d '*.pr.biyard.co'

# HTTP - redirect to HTTPS & serve ACME challenge
server {
    listen 80;
    server_name ~^(?<svc>[a-z0-9]+)-(?<pr>\d+)\.pr\.biyard\.co$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ~^(?<svc>[a-z0-9]+)-(?<pr>\d+)\.pr\.biyard\.co$;

    ssl_certificate /etc/letsencrypt/live/pr.biyard.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pr.biyard.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Public resolver: needed because the /api upstream host is built from a variable.
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # /api/  ->  https://{svc}.biyard.co/api/   (original URI is preserved)
    location /api/ {
        set $api_backend "$svc.biyard.co";
        proxy_pass https://$api_backend;

        proxy_ssl_server_name on;            # send SNI to upstream
        proxy_set_header Host $api_backend;  # upstream expects its own vhost
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # /  ->  static files under /var/www/pr/{svc}-{pr}  (SPA fallback to index.html)
    location / {
        root /var/www/pr/$svc-$pr;
        try_files $uri $uri/ /index.html;
    }
}
