# HTTP - redirect to HTTPS & serve ACME challenge
server {
    listen 80;
    server_name essence.miner.biyard.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name essence.miner.biyard.co;

    ssl_certificate /etc/letsencrypt/live/miner.biyard.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miner.biyard.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /mocks/ {
        root /var/www/ratel;
    }

    location / {
        proxy_pass http://192.168.0.42:8280;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed by n8n)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

